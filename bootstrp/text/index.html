<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEase - Online Store</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="#">ShopEase</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#products">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
          <li class="nav-item ms-3">
            <button id="cartBtn" class="btn btn-outline-primary position-relative">
              🛒 Cart
              <span id="cart-count"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                0
              </span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero text-center d-flex align-items-center justify-content-center">
    <div class="container">
      <h1 class="display-4 fw-bold text-white animate__animated animate__fadeInDown">Shop the Latest Trends</h1>
      <p class="lead text-white-50 animate__animated animate__fadeInUp">Discover quality products at unbeatable prices!
      </p>
      <a href="#products" class="btn btn-lg btn-primary mt-3 shadow">Shop Now</a>
    </div>
  </section>

  <!-- Product Section -->
  <section id="products" class="py-5">
    <div class="container">
      <h2 class="text-center mb-5 fw-bold text-primary">Our Products</h2>
      <div class="row g-4">
        <!-- Example Product -->
        <div class="col-md-3">
          <div class="card product-card shadow-sm">
            <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Sneakers">
            <div class="card-body text-center">
              <h5 class="card-title">Stylish Sneakers</h5>
              <p class="card-text">$59.99</p>
              <button class="btn btn-primary add-to-cart" data-name="Stylish Sneakers" data-price="59.99">Add to
                Cart</button>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card product-card shadow-sm">
            <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Watch">
            <div class="card-body text-center">
              <h5 class="card-title">Classic Watch</h5>
              <p class="card-text">$79.99</p>
              <button class="btn btn-primary add-to-cart" data-name="Classic Watch" data-price="79.99">Add to
                Cart</button>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card product-card shadow-sm">
            <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Bag">
            <div class="card-body text-center">
              <h5 class="card-title">Leather Bag</h5>
              <p class="card-text">$89.99</p>
              <button class="btn btn-primary add-to-cart" data-name="Leather Bag" data-price="89.99">Add to
                Cart</button>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card product-card shadow-sm">
            <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Headphones">
            <div class="card-body text-center">
              <h5 class="card-title">Wireless Headphones</h5>
              <p class="card-text">$99.99</p>
              <button class="btn btn-primary add-to-cart" data-name="Wireless Headphones" data-price="99.99">Add to
                Cart</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">&copy; 2025 ShopEase. All Rights Reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
